<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living and Non-Living Things Game</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #dff6ff, #fff7d6);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px 18px 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: #1d3557;
    }

    .subtitle {
      margin: 0 0 16px;
      font-size: clamp(0.95rem, 2.6vw, 1.1rem);
      color: #555;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
      background: #f8fbff;
      border-radius: 16px;
      padding: 12px;
    }

    .info-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
      font-weight: bold;
      color: #264653;
      min-width: 120px;
    }

    .sound-control {
      flex: 1;
      min-width: 220px;
      text-align: left;
      background: #ffffff;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    .sound-control label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #264653;
      font-size: 0.95rem;
    }

    .sound-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .sound-row input[type="range"] {
      width: 100%;
      accent-color: #ff7b54;
      cursor: pointer;
    }

    .sound-value {
      min-width: 44px;
      font-weight: bold;
      color: #e76f51;
    }

    .question-card {
      background: linear-gradient(180deg, #fff9ec, #ffffff);
      border: 3px solid #ffe7a3;
      border-radius: 22px;
      padding: 20px 16px;
      margin-bottom: 18px;
    }

    .question-label {
      font-size: 1rem;
      color: #7a5c00;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: bold;
      color: #1d3557;
      min-height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 10px;
    }

    .choice-btn {
      border: none;
      border-radius: 20px;
      padding: 18px 12px;
      font-size: clamp(1rem, 2.8vw, 1.25rem);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      min-height: 78px;
      color: white;
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
    }

    .choice-btn:active {
      transform: scale(0.98);
    }

    .living-btn {
      background: linear-gradient(135deg, #2a9d8f, #43c59e);
    }

    .nonliving-btn {
      background: linear-gradient(135deg, #457b9d, #5da9e9);
    }

    .choice-btn:hover {
      transform: translateY(-2px);
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, #22c55e, #4ade80) !important;
    }

    .choice-btn.wrong {
      background: linear-gradient(135deg, #ef4444, #f87171) !important;
    }

    .feedback {
      min-height: 42px;
      margin-top: 16px;
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-weight: bold;
      color: #264653;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      background: #e8eef3;
      border-radius: 999px;
      overflow: hidden;
      margin: 18px 0 12px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb703, #fb8500);
      transition: width 0.35s ease;
    }

    .result-screen {
      display: none;
      padding: 24px 12px 10px;
    }

    .result-screen h2 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: #1d3557;
      margin-bottom: 12px;
    }

    .result-screen p {
      font-size: clamp(1.1rem, 3vw, 1.3rem);
      color: #444;
      margin: 8px 0;
    }

    .stars {
      font-size: 2rem;
      margin: 10px 0 14px;
    }

    .restart-wrap {
      margin-top: 20px;
    }

    .restart-btn {
      width: 100%;
      max-width: 320px;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff7b54, #ff4d6d);
      box-shadow: 0 8px 18px rgba(255, 77, 109, 0.28);
      transition: transform 0.15s ease;
    }

    .restart-btn:active {
      transform: scale(0.98);
    }

    canvas#confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    @media (max-width: 640px) {
      .game-container {
        padding: 16px 14px 24px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .info-box,
      .sound-control {
        width: 100%;
      }

      .question-text {
        min-height: 84px;
      }
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="game-container">
    <h1>🌱 Living or Non-Living? 🪨</h1>
    <p class="subtitle">Choose the correct category for each item.</p>

    <div class="top-bar">
      <div class="info-box" id="questionCounter">Question 1 / 10</div>
      <div class="info-box" id="scoreDisplay">Score: 0</div>

      <div class="sound-control">
        <label for="volumeSlider">🔊 Sound Volume</label>
        <div class="sound-row">
          <input type="range" id="volumeSlider" min="0" max="100" value="85" />
          <div class="sound-value" id="volumeValue">85%</div>
        </div>
      </div>
    </div>

    <div id="quizScreen">
      <div class="question-card">
        <div class="question-label">Look carefully and choose:</div>
        <div class="question-text" id="questionText">Tree</div>

        <div class="buttons">
          <button class="choice-btn living-btn" onclick="checkAnswer('Living')">🌿 Living</button>
          <button class="choice-btn nonliving-btn" onclick="checkAnswer('Non-Living')">🧱 Non-Living</button>
        </div>

        <div class="feedback" id="feedback"></div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <h2>🎉 Great Job! 🎉</h2>
      <div class="stars" id="starsDisplay">⭐ ⭐ ⭐</div>
      <p id="finalScoreText">You scored 8 out of 10!</p>
      <p id="finalMessage">You are getting really good at sorting things!</p>
    </div>

    <div class="restart-wrap">
      <button class="restart-btn" onclick="restartGame()">🔄 Restart Game</button>
    </div>
  </div>

  <script>
    const allQuestions = [
      { item: "Tree", answer: "Living" },
      { item: "Dog", answer: "Living" },
      { item: "Butterfly", answer: "Living" },
      { item: "Fish", answer: "Living" },
      { item: "Bird", answer: "Living" },
      { item: "Rock", answer: "Non-Living" },
      { item: "Chair", answer: "Non-Living" },
      { item: "Book", answer: "Non-Living" },
      { item: "Ball", answer: "Non-Living" },
      { item: "Pencil", answer: "Non-Living" }
    ];

    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let locked = false;

    const questionText = document.getElementById("questionText");
    const feedback = document.getElementById("feedback");
    const questionCounter = document.getElementById("questionCounter");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const progressFill = document.getElementById("progressFill");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const finalScoreText = document.getElementById("finalScoreText");
    const finalMessage = document.getElementById("finalMessage");
    const starsDisplay = document.getElementById("starsDisplay");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeValue = document.getElementById("volumeValue");

    const buttons = () => document.querySelectorAll(".choice-btn");

    volumeSlider.addEventListener("input", () => {
      volumeValue.textContent = volumeSlider.value + "%";
    });

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function loadGame() {
      questions = shuffleArray(allQuestions);
      currentQuestionIndex = 0;
      score = 0;
      locked = false;
      quizScreen.style.display = "block";
      resultScreen.style.display = "none";
      updateScore();
      showQuestion();
    }

    function showQuestion() {
      resetButtons();
      feedback.textContent = "";
      locked = false;

      const current = questions[currentQuestionIndex];
      questionText.textContent = current.item;
      questionCounter.textContent = `Question ${currentQuestionIndex + 1} / ${questions.length}`;
      progressFill.style.width = `${(currentQuestionIndex / questions.length) * 100}%`;
    }

    function resetButtons() {
      buttons().forEach(btn => {
        btn.disabled = false;
        btn.classList.remove("correct", "wrong");
      });
    }

    function checkAnswer(selected) {
      if (locked) return;
      locked = true;

      startAudioContextIfNeeded();

      const current = questions[currentQuestionIndex];
      const isCorrect = selected === current.answer;

      buttons().forEach(btn => {
        btn.disabled = true;
        const btnText = btn.textContent.toLowerCase();
        const thisValue = btnText.includes("living") && !btnText.includes("non") ? "Living" : "Non-Living";

        if (thisValue === current.answer) {
          btn.classList.add("correct");
        }
        if (thisValue === selected && !isCorrect) {
          btn.classList.add("wrong");
        }
      });

      if (isCorrect) {
        score++;
        updateScore();
        feedback.textContent = "✅ Correct!";
        playCorrectSound();
        burstConfetti();
      } else {
        feedback.textContent = `❌ Oops! The correct answer is ${current.answer}.`;
        playWrongSound();
      }

      setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
          showQuestion();
        } else {
          endGame();
        }
      }, 1400);
    }

    function updateScore() {
      scoreDisplay.textContent = `Score: ${score}`;
    }

    function endGame() {
      progressFill.style.width = "100%";
      quizScreen.style.display = "none";
      resultScreen.style.display = "block";
      finalScoreText.textContent = `You scored ${score} out of ${questions.length}!`;

      let message = "";
      let stars = "";

      if (score === 10) {
        message = "Outstanding! You sorted every item correctly! 🌟";
        stars = "⭐ ⭐ ⭐";
        burstConfetti(220);
        playWinSound();
      } else if (score >= 8) {
        message = "Excellent work! You really know living and non-living things.";
        stars = "⭐ ⭐ ⭐";
        burstConfetti(160);
        playWinSound();
      } else if (score >= 5) {
        message = "Nice job! A little more practice and you'll be a sorting superstar.";
        stars = "⭐ ⭐";
      } else {
        message = "Good try! Play again and see if you can get a higher score.";
        stars = "⭐";
      }

      finalMessage.textContent = message;
      starsDisplay.textContent = stars;
    }

    function restartGame() {
      loadGame();
    }

    // ===== Sound with Web Audio API =====
    let audioCtx = null;

    function startAudioContextIfNeeded() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function getVolume() {
      return parseInt(volumeSlider.value, 10) / 100;
    }

    function playTone(freq, duration, type = "sine", volume = 0.8) {
      if (!audioCtx) return;

      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

      const finalVolume = Math.min(1, volume * getVolume());

      gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(finalVolume, audioCtx.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + duration);
    }

    function playCorrectSound() {
      playTone(523.25, 0.12, "triangle", 0.9);
      setTimeout(() => playTone(659.25, 0.14, "triangle", 0.9), 90);
      setTimeout(() => playTone(783.99, 0.18, "triangle", 0.95), 180);
    }

    function playWrongSound() {
      playTone(220, 0.18, "sawtooth", 0.85);
      setTimeout(() => playTone(180, 0.22, "sawtooth", 0.85), 120);
    }

    function playWinSound() {
      playTone(523.25, 0.12, "triangle", 0.95);
      setTimeout(() => playTone(659.25, 0.12, "triangle", 0.95), 100);
      setTimeout(() => playTone(783.99, 0.12, "triangle", 0.95), 200);
      setTimeout(() => playTone(1046.5, 0.26, "triangle", 1), 320);
    }

    // ===== Confetti =====
    const confettiCanvas = document.getElementById("confettiCanvas");
    const ctx = confettiCanvas.getContext("2d");
    let confettiPieces = [];
    let confettiAnimationId = null;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function burstConfetti(count = 120) {
      const colors = ["#ff4d6d", "#ffbe0b", "#3a86ff", "#2ec4b6", "#8338ec", "#fb5607"];

      for (let i = 0; i < count; i++) {
        confettiPieces.push({
          x: Math.random() * confettiCanvas.width,
          y: Math.random() * -confettiCanvas.height * 0.4,
          w: Math.random() * 10 + 6,
          h: Math.random() * 14 + 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          speedX: (Math.random() - 0.5) * 6,
          speedY: Math.random() * 4 + 3,
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 12,
          alpha: 1,
          gravity: 0.08 + Math.random() * 0.08
        });
      }

      if (!confettiAnimationId) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      confettiPieces.forEach((p, index) => {
        p.x += p.speedX;
        p.y += p.speedY;
        p.speedY += p.gravity;
        p.rotation += p.rotationSpeed;
        p.alpha -= 0.004;

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();

        if (p.y > confettiCanvas.height + 20 || p.alpha <= 0) {
          confettiPieces.splice(index, 1);
        }
      });

      if (confettiPieces.length > 0) {
        confettiAnimationId = requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        cancelAnimationFrame(confettiAnimationId);
        confettiAnimationId = null;
      }
    }

    loadGame();
  </script>
</body>
</html>
