<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grade 3 EVS | Living and Non-living Things</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Arial", sans-serif;
  background: linear-gradient(135deg, #fdf0e0, #fff8f0);
  color: #2b2b2b;
  overflow: hidden;
}

.screen {
  width: 100vw;
  height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.screen.active {
  display: flex;
}

.card {
  width: min(1100px, 94vw);
  min-height: 78vh;
  background: rgba(255, 255, 255, 0.92);
  border-radius: 28px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.12);
  padding: 30px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Splash */
#splash {
  background: linear-gradient(135deg, #fdf0e0, #ffffff);
}

.logo-box {
  text-align: center;
  animation: popIn 1s ease;
}

.logo-box img {
  max-width: 280px;
  max-height: 180px;
  object-fit: contain;
}

.logo-box h2 {
  margin-top: 18px;
  color: #ae3436;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

/* General */
.badge {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 999px;
  background: #f16139;
  color: white;
  font-weight: bold;
  margin-bottom: 14px;
}

h1 {
  font-size: clamp(30px, 5vw, 58px);
  color: #ae3436;
  margin: 8px 0 16px;
}

h2 {
  font-size: clamp(26px, 4vw, 44px);
  color: #ae3436;
  margin: 10px 0 16px;
}

p {
  font-size: clamp(20px, 2.3vw, 30px);
  line-height: 1.45;
}

.small {
  font-size: clamp(17px, 1.8vw, 22px);
}

.visual-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 28px;
  justify-content: center;
}

.item {
  width: 145px;
  min-height: 130px;
  border-radius: 22px;
  background: #fdf0e0;
  border: 3px solid #f7cbb5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: floaty 2.2s ease-in-out infinite;
}

.item:nth-child(even) {
  animation-delay: 0.3s;
}

@keyframes floaty {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.icon {
  font-size: 54px;
}

.label {
  font-size: 18px;
  font-weight: bold;
  margin-top: 8px;
  text-align: center;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 24px;
}

.box {
  background: #fdf0e0;
  border-radius: 24px;
  padding: 22px;
  border: 3px solid #f7cbb5;
}

.box h3 {
  color: #ae3436;
  font-size: 28px;
  margin: 0 0 12px;
}

.list {
  font-size: clamp(18px, 2vw, 25px);
  line-height: 1.6;
}

.nav {
  position: absolute;
  left: 30px;
  right: 30px;
  bottom: 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  border: none;
  padding: 14px 22px;
  border-radius: 999px;
  background: #ae3436;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #f16139;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.progress {
  font-size: 17px;
  font-weight: bold;
  color: #ae3436;
}

.quiz-options {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.quiz-options button {
  background: white;
  color: #ae3436;
  border: 3px solid #ae3436;
  min-width: 180px;
}

.feedback {
  margin-top: 20px;
  font-size: 26px;
  font-weight: bold;
  color: #ae3436;
}

.pill {
  display: inline-block;
  padding: 8px 16px;
  border-radius: 999px;
  background: white;
  border: 2px solid #f16139;
  color: #ae3436;
  margin: 6px;
  font-size: 20px;
  font-weight: bold;
}

.scene-art {
  position: absolute;
  right: -30px;
  bottom: -30px;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(241, 97, 57, 0.14);
}

@media (max-width: 760px) {
  .card {
    min-height: 86vh;
    padding: 22px;
  }

  .two-col {
    grid-template-columns: 1fr;
  }

  .item {
    width: 120px;
    min-height: 110px;
  }

  .icon {
    font-size: 42px;
  }

  .nav {
    left: 18px;
    right: 18px;
  }

  button {
    padding: 12px 16px;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<!-- Splash Screen -->
<section class="screen active" id="splash">
  <div class="logo-box">
    <img src="assets/innovine-logo.png" alt="Innovine Logo" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
    <h1 id="logoFallback" style="display:none;">Innovine</h1>
    <h2>Learning Begins...</h2>
  </div>
</section>

<!-- Slide Container -->
<section class="screen" id="lesson">
  <div class="card">
    <div class="badge" id="badge">Grade 3 EVS</div>
    <h1 id="title"></h1>
    <p id="content"></p>
    <div id="visuals" class="visual-row"></div>
    <div id="extra"></div>
    <div class="scene-art"></div>

    <div class="nav">
      <button id="prevBtn" onclick="prevSlide()">Back</button>
      <span class="progress" id="progress"></span>
      <button id="nextBtn" onclick="nextSlide()">Next</button>
    </div>
  </div>
</section>

<script>
const slides = [
  {
    badge: "Warm-up",
    title: "Look Around!",
    content: "Look around your room. You may see a plant, a bag, a table, a pet, a book or a toy. Are all of them alive?",
    visuals: [
      ["🌱", "Plant"], ["🎒", "Bag"], ["🐱", "Pet"], ["📘", "Book"], ["🧸", "Toy"]
    ]
  },
  {
    badge: "Concept 1",
    title: "Living Things",
    content: "Things that are alive are called living things. People, animals and plants are living things.",
    visuals: [
      ["👧", "Child"], ["🐯", "Tiger"], ["🐟", "Fish"], ["🐦", "Bird"], ["🌳", "Tree"]
    ]
  },
  {
    badge: "Concept 2",
    title: "Non-living Things",
    content: "Things that are not alive are called non-living things. They do not eat, breathe, grow, feel or reproduce.",
    visuals: [
      ["🪨", "Rock"], ["🚗", "Car"], ["💻", "Computer"], ["🪑", "Chair"], ["☀️", "Sun"]
    ]
  },
  {
    badge: "Types",
    title: "Two Types of Non-living Things",
    content: "Some non-living things are found in nature. Some are made by people.",
    extra: `
      <div class="two-col">
        <div class="box">
          <h3>Natural Non-living Things</h3>
          <div class="pill">Sun</div><div class="pill">Moon</div><div class="pill">Rocks</div><div class="pill">Mountains</div>
        </div>
        <div class="box">
          <h3>Man-made Non-living Things</h3>
          <div class="pill">Table</div><div class="pill">Chair</div><div class="pill">Car</div><div class="pill">Computer</div>
        </div>
      </div>
    `
  },
  {
    badge: "Feature 1",
    title: "Living Things Grow",
    content: "All living things grow and change. A baby grows into an adult. A seed grows into a plant. A puppy grows into a dog.",
    visuals: [
      ["👶➡️🧑", "Baby to Adult"], ["🌰➡️🌳", "Seed to Tree"], ["🐶➡️🐕", "Puppy to Dog"]
    ]
  },
  {
    badge: "Feature 2",
    title: "Living Things Move",
    content: "Living things can move on their own. People walk, birds fly, fish swim and snakes crawl. Plants also show movement, such as roots growing down and leaves growing upwards.",
    visuals: [
      ["🏃", "Run"], ["🐦", "Fly"], ["🐟", "Swim"], ["🐍", "Crawl"], ["🌻", "Turns to Sun"]
    ]
  },
  {
    badge: "Remember",
    title: "Does a Car Move on its Own?",
    content: "A car can move from one place to another, but it cannot move on its own. A person must start and drive it. So, a car is non-living.",
    visuals: [
      ["🚗", "Car"], ["👤", "Driver"], ["❌", "Not Living"]
    ]
  },
  {
    badge: "Feature 3",
    title: "Living Things Need Food",
    content: "All living things need food to grow and get energy. Animals and people eat food. Plants make their own food using sunlight, water and carbon dioxide.",
    visuals: [
      ["🍎", "Food"], ["🐕", "Animal Eats"], ["☀️💧🌿", "Plant Makes Food"]
    ]
  },
  {
    badge: "Feature 4",
    title: "Living Things Breathe",
    content: "Living things breathe. People and land animals breathe through lungs. Fish breathe through gills. Plants breathe through tiny holes called stomata.",
    visuals: [
      ["🫁", "Lungs"], ["🐟", "Gills"], ["🍃", "Stomata"]
    ]
  },
  {
    badge: "Feature 5",
    title: "Living Things Feel",
    content: "Living things can feel. We feel heat, cold and pain. Animals also feel. Some plants, like the touch-me-not plant, show feeling by closing their leaves when touched.",
    visuals: [
      ["✋", "Touch"], ["🐈", "Animal Feels"], ["🌿", "Touch-me-not"]
    ]
  },
  {
    badge: "Feature 6",
    title: "Living Things Have a Lifespan",
    content: "Every living thing lives for a certain time. This is called its lifespan. A housefly may live for a few weeks, while a tortoise can live for more than 100 years.",
    visuals: [
      ["🪰", "Housefly"], ["🐢", "Tortoise"], ["⏳", "Lifespan"]
    ]
  },
  {
    badge: "Feature 7",
    title: "Living Things Reproduce",
    content: "Living things reproduce. This means they can have young ones or make new living things. Dogs give birth to puppies. Ducks lay eggs. Plants grow from seeds.",
    visuals: [
      ["🐕🐶", "Puppies"], ["🦆🥚", "Eggs"], ["🌱", "Seedling"]
    ]
  },
  {
    badge: "Compare",
    title: "Living vs Non-living",
    content: "Let us compare them.",
    extra: `
      <div class="two-col">
        <div class="box">
          <h3>Living Things</h3>
          <div class="list">
            ✓ Need food, air and water<br>
            ✓ Grow<br>
            ✓ Move on their own<br>
            ✓ Feel<br>
            ✓ Have a lifespan<br>
            ✓ Reproduce
          </div>
        </div>
        <div class="box">
          <h3>Non-living Things</h3>
          <div class="list">
            ✗ Do not need food, air and water<br>
            ✗ Do not grow<br>
            ✗ Cannot move on their own<br>
            ✗ Do not feel<br>
            ✗ Do not have a lifespan<br>
            ✗ Do not reproduce
          </div>
        </div>
      </div>
    `
  },
  {
    badge: "Quick Quiz",
    title: "Is a Tree Living or Non-living?",
    content: "Choose the correct answer.",
    quiz: {
      options: ["Living", "Non-living"],
      answer: "Living",
      feedback: "Correct! A tree grows, breathes, needs food and reproduces."
    },
    visuals: [["🌳", "Tree"]]
  },
  {
    badge: "Quick Quiz",
    title: "Is an Alarm Clock Living or Non-living?",
    content: "Choose the correct answer.",
    quiz: {
      options: ["Living", "Non-living"],
      answer: "Non-living",
      feedback: "Correct! An alarm clock can ring, but it does not grow, breathe, feel or reproduce."
    },
    visuals: [["⏰", "Alarm Clock"]]
  },
  {
    badge: "Recap",
    title: "What Did We Learn?",
    content: "Living things are alive. Non-living things are not alive. Living things grow, move, need food, breathe, feel, have a lifespan and reproduce.",
    visuals: [
      ["🌱", "Grow"], ["🏃", "Move"], ["🍎", "Food"], ["🫁", "Breathe"], ["❤️", "Feel"], ["🐣", "Reproduce"]
    ]
  },
  {
    badge: "Final Task",
    title: "Your Turn, Little Scientist!",
    content: "Look around your home, classroom or garden. Find five living things and five non-living things.",
    visuals: [
      ["🔍", "Observe"], ["🌍", "Explore"], ["📝", "Make a List"]
    ]
  }
];

let currentSlide = 0;

setTimeout(() => {
  document.getElementById("splash").classList.remove("active");
  document.getElementById("lesson").classList.add("active");
  renderSlide();
}, 5000);

function renderSlide() {
  const slide = slides[currentSlide];

  document.getElementById("badge").textContent = slide.badge;
  document.getElementById("title").textContent = slide.title;
  document.getElementById("content").textContent = slide.content;
  document.getElementById("progress").textContent = `${currentSlide + 1} / ${slides.length}`;

  const visuals = document.getElementById("visuals");
  visuals.innerHTML = "";

  if (slide.visuals) {
    slide.visuals.forEach(v => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<div class="icon">${v[0]}</div><div class="label">${v[1]}</div>`;
      visuals.appendChild(div);
    });
  }

  const extra = document.getElementById("extra");
  extra.innerHTML = slide.extra || "";

  if (slide.quiz) {
    const quizBox = document.createElement("div");
    quizBox.className = "quiz-options";

    slide.quiz.options.forEach(option => {
      const btn = document.createElement("button");
      btn.textContent = option;
      btn.onclick = () => checkAnswer(option, slide.quiz.answer, slide.quiz.feedback);
      quizBox.appendChild(btn);
    });

    const feedback = document.createElement("div");
    feedback.className = "feedback";
    feedback.id = "feedback";

    extra.appendChild(quizBox);
    extra.appendChild(feedback);
  }

  document.getElementById("prevBtn").disabled = currentSlide === 0;
  document.getElementById("nextBtn").textContent = currentSlide === slides.length - 1 ? "Restart" : "Next";
}

function checkAnswer(selected, answer, feedbackText) {
  const feedback = document.getElementById("feedback");
  if (selected === answer) {
    feedback.textContent = "✅ " + feedbackText;
  } else {
    feedback.textContent = "Try again. Look carefully at the features.";
  }
}

function nextSlide() {
  if (currentSlide === slides.length - 1) {
    currentSlide = 0;
  } else {
    currentSlide++;
  }
  renderSlide();
}

function prevSlide() {
  if (currentSlide > 0) {
    currentSlide--;
    renderSlide();
  }
}
</script>

</body>
</html>
