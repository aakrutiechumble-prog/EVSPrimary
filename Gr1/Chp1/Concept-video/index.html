<script>
let i=0;
let voiceOn=true;
let timer=null;
let current=null;
let quizIndex=0;
let score=0;

const quizItems=[
{item:"Tiger", icon:"🐯", answer:"Living"},
{item:"Clock", icon:"🕒", answer:"Non-living"},
{item:"Tree", icon:"🌳", answer:"Living"},
{item:"Chair", icon:"🪑", answer:"Non-living"}
];

const steps=[
{
t:"Warm-up question",
d:"Look around you. What do you see near you? Maybe a bag, a plant, a pencil, or a person. Do all these things behave in the same way?",
visual:"warmup",
pause:2200
},
{
t:"Living and non-living",
d:"Things that are alive are called living things. Things that are not alive are called non-living things.",
visual:"labels"
},
{
t:"Living things",
d:"People, animals, and plants are living things. They are alive, just like you.",
visual:"living"
},
{
t:"Non-living things",
d:"Things like tables, cars, rocks, and the sun are non-living. They are not alive.",
visual:"nonliving"
},
{
t:"Types of non-living things",
d:"Non-living things can be natural or man-made.",
visual:"types"
},
{
t:"Living things grow",
d:"Living things grow. A baby grows into an adult. A seed grows into a plant. But a table does not grow.",
visual:"grow"
},
{
t:"Living things move",
d:"Living things can move on their own. Birds fly. Fish swim. Children run. Plants also move slowly.",
visual:"move"
},
{
t:"Important point",
d:"A car moves, but only when someone starts it. So, a car is non-living.",
visual:"car"
},
{
t:"Living things need food",
d:"Living things need food to live and grow. Animals eat food. Plants make their own food using sunlight, water, and air.",
visual:"food"
},
{
t:"Living things breathe",
d:"Living things breathe. Humans use lungs. Fish use gills. Plants breathe through tiny holes in their leaves.",
visual:"breathe"
},
{
t:"Living things feel",
d:"Living things can feel heat, cold, and pain. Even some plants respond when touched. A chair does not feel anything.",
visual:"feel"
},
{
t:"Living things have a lifespan",
d:"Living things live for a certain time. This is called their lifespan. A fly lives for a few weeks. A tortoise can live for over 100 years.",
visual:"lifespan"
},
{
t:"Living things reproduce",
d:"Living things can reproduce. Dogs have puppies. Birds lay eggs. Plants grow from seeds.",
visual:"reproduce"
},
{
t:"Quick recap",
d:"Living things grow, move, need food, breathe, feel, have a lifespan, and reproduce. Non-living things do not do these.",
visual:"recap"
},
{
t:"Mini quiz",
d:"Let us test you. Choose Living or Non-living for each item.",
visual:"quiz",
quiz:true
},
{
t:"Real-life connect",
d:"Now look around you. Can you find 5 living things and 5 non-living things? You are now a smart observer.",
visual:"closure"
}
];

function speak(text,cb){
clearTimeout(timer);
speechSynthesis.cancel();

if(!voiceOn){
setTimeout(cb,2400);
return;
}

let u=new SpeechSynthesisUtterance(text);
u.rate=.78;
u.pitch=1;
u.volume=1;
u.lang="en-US";
u.onend=()=>setTimeout(cb,1000);
u.onerror=()=>setTimeout(cb,1200);
speechSynthesis.speak(u);
}

function sound(type){
try{
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=type==="correct"?720:type==="tick"?520:220;
gain.gain.value=.05;
osc.start();
osc.stop(ctx.currentTime+.13);
}catch(e){}
}

function renderVisual(s){
let v=document.getElementById("visualArea");
v.innerHTML="";

if(s.visual==="warmup"){
v.innerHTML=`
<div class="featureVisual">
  <div class="bigIcon">👀</div>
  <div class="iconRow">
    <div class="icon">🎒</div>
    <div class="icon">🌱</div>
    <div class="icon">✏️</div>
    <div class="icon">🧒</div>

</div>`;
}

if(s.visual==="labels"){
v.innerHTML=`

<div class="box living"><h3>Living Things</h3><div class="bigIcon">🌱</div></div>
<div class="box nonliving"><h3>Non-living Things</h3><div class="bigIcon">🪨</div></div>
</div>`;
}

if(s.visual==="living"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🧒</div><div class="icon living">🐦</div><div class="icon living">🐟</div><div class="icon living">🌳</div>
</div>`;
}

if(s.visual==="nonliving"){
v.innerHTML=`<div class="iconRow">
<div class="icon nonliving">🪑</div><div class="icon nonliving">🚗</div><div class="icon nonliving">🪨</div><div class="icon nonliving">☀️</div>
</div>`;
}

if(s.visual==="types"){
v.innerHTML=`
<div class="sceneGrid">
<div class="box natural"><h3>Natural</h3><div class="iconRow">
<div class="icon natural">☀️</div><div class="icon natural">🌙</div><div class="icon natural">⛰️</div><div class="icon natural">🪨</div>
</div></div>
<div class="box manmade"><h3>Man-made</h3><div class="iconRow">
<div class="icon manmade">🪑</div><div class="icon manmade">🚗</div><div class="icon manmade">💻</div><div class="icon manmade">🏢</div>
</div></div>
</div>`;
}

if(s.visual==="grow"){
v.innerHTML=`<div class="featureVisual">
<div class="arrowFlow"><span>👶</span><span>→</span><span>🧒</span><span>→</span><span>🧑</span></div>
<div class="arrowFlow"><span>🌰</span><span>→</span><span>🌱</span><span>→</span><span>🌳</span></div>
<span class="pill">🪑 Table: does not grow</span>
</div>`;
}

if(s.visual==="move"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🐦</div><div class="icon living">🐟</div><div class="icon living">🏃</div><div class="icon living">🌻</div>
</div>`;
}

if(s.visual==="car"){
v.innerHTML=`<div class="featureVisual">
<div class="bigIcon">🚗</div>
<span class="pill">Moves only when started</span>
<span class="pill nonliving">So, it is non-living</span>
</div>`;
}

if(s.visual==="food"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🧒🍎</div><div class="icon living">🐶🍖</div><div class="icon living">🌱☀️</div><div class="icon nonliving">🧸</div>
</div>`;
}

if(s.visual==="breathe"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🫁</div><div class="icon living">🐟</div><div class="icon living">🍃</div>
</div>`;
}

if(s.visual==="feel"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🔥😮</div><div class="icon living">🐶🥶</div><div class="icon living">🌿</div><div class="icon nonliving">🪑</div>
</div>`;
}

if(s.visual==="lifespan"){
v.innerHTML=`<div class="featureVisual">
<div class="arrowFlow"><span>🪰</span><span class="pill">few weeks</span></div>
<div class="arrowFlow"><span>🐢</span><span class="pill">100+ years</span></div>
</div>`;
}

if(s.visual==="reproduce"){
v.innerHTML=`<div class="iconRow">
<div class="icon living">🐶🐶</div><div class="icon living">🥚🐣</div><div class="icon living">🌰🌱</div><div class="icon nonliving">🧸</div>
</div>`;
}

if(s.visual==="recap"){
v.innerHTML=`
<div class="compareTable">
<div class="box living"><h3>Living</h3>✔ Grow<br>✔ Move<br>✔ Need food<br>✔ Breathe<br>✔ Feel<br>✔ Lifespan<br>✔ Reproduce</div>
<div class="box nonliving"><h3>Non-living</h3>✘ Do not grow<br>✘ Do not breathe<br>✘ Do not feel<br>✘ Do not reproduce</div>
</div>`;
}

if(s.visual==="quiz"){
showQuizVisual();
}

if(s.visual==="closure"){
v.innerHTML=`
<div class="sceneGrid">
<div class="box living"><h3>Find 5 living things</h3><div class="bigIcon">🌳</div></div>
<div class="box nonliving"><h3>Find 5 non-living things</h3><div class="bigIcon">📘</div></div>
</div>`;
}

sound("tick");
}

function showQuizVisual(){
let item=quizItems[quizIndex];
document.getElementById("visualArea").innerHTML=`
<div class="featureVisual">
<div class="bigIcon">${item.icon}</div>
<span class="pill">${item.item}</span>
</div>`;
}

function play(){
if(i>=steps.length)return;

let s=steps[i];

document.getElementById("startCard").style.display="none";
document.getElementById("lessonCard").style.display="flex";
document.getElementById("progress").innerText=`Step ${i+1} of ${steps.length}`;
document.getElementById("title").innerText=s.t;
document.getElementById("text").innerText=s.d;
document.getElementById("feedback").innerText="";
document.getElementById("options").innerHTML="";

renderVisual(s);

if(s.quiz){
quizIndex=0;
score=0;
current=s;
showQuizQuestion();
speak(s.d,()=>{});
return;
}

document.getElementById("qbox").style.display="none";

speak(s.d,()=>{
if(s.pause){
timer=setTimeout(()=>{i++;play();},s.pause);
}else{
i++;
play();
}
});
}

function showQuizQuestion(){
let item=quizItems[quizIndex];
showQuizVisual();

document.getElementById("qbox").style.display="block";
document.getElementById("q").innerText=`${item.item}: Living or Non-living?`;

["Living","Non-living"].forEach(opt=>{
let b=document.createElement("button");
b.className="optionBtn";
b.innerText=opt;
b.onclick=()=>checkQuiz(opt);
document.getElementById("options").appendChild(b);
});
}

function checkQuiz(value){
let item=quizItems[quizIndex];
let feedback=document.getElementById("feedback");

if(value===item.answer){
feedback.innerText="Correct!";
feedback.className="correct";
score++;
sound("correct");
confetti();
}else{
feedback.innerText=`Not quite. ${item.item} is ${item.answer}.`;
feedback.className="wrong";
sound("wrong");
}

quizIndex++;

setTimeout(()=>{
document.getElementById("feedback").innerText="";
document.getElementById("options").innerHTML="";

if(quizIndex<quizItems.length){
showQuizQuestion();
}else{
document.getElementById("q").innerText=`Quiz complete! Score: ${score}/${quizItems.length}`;
setTimeout(()=>{
i++;
play();
},1800);
}
},1200);
}

function confetti(){
for(let k=0;k<20;k++){
let d=document.createElement("div");
d.className="star";
d.style.left=Math.random()*100+"vw";
d.style.top="-20px";
d.style.animationDelay=Math.random()*.4+"s";
document.body.appendChild(d);
setTimeout(()=>d.remove(),1600);
}
}

function start(){
speechSynthesis.cancel();
clearTimeout(timer);
i=0;
quizIndex=0;
score=0;
play();
}

function toggleVoice(){
voiceOn=!voiceOn;
speechSynthesis.cancel();
}

setTimeout(()=>{
document.getElementById("logo").style.display="none";
document.getElementById("app").style.display="block";
},5000);
</script>

</body>
</html>
